              - paragraph [ref=e359]:
                - text: "Notice the window function sits on top of the aggregate:"
                - code [ref=e360]: RANK() OVER (ORDER BY SUM(o.total) DESC)
                - text: ranks the grouped totals. That layering, aggregate first, window over the result, is the move that unlocks most real reporting.
              - paragraph [ref=e361]:
                - text: "> 💡"
                - strong [ref=e362]: "Key:"
                - text: you can use an aggregate inside a window's ORDER BY. The database computes the GROUP BY, then ranks the grouped rows. This is how leaderboards, top-N-per-group, and share-of-total reports get written.
