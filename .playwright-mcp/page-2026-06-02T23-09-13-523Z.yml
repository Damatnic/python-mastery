              - paragraph [ref=e344]: "This is a synthesis lesson. No new syntax, just the pieces you already have working together on a real question: who are our best customers, and which products drive the most revenue."
              - paragraph [ref=e345]: "Ranking customers by spend needs a join (customers to orders), an aggregate (SUM of order totals), and a window (RANK over that sum):"
