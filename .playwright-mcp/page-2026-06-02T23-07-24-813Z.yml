                - text: You mark a function
                - code [ref=e309]: async def
                - text: ", and inside it you"
                - code [ref=e310]: await
                - text: other async calls. An awaited call can pause and hand control back so other work proceeds.
              - code [ref=e312]: "import asyncio async def fetch(name): await asyncio.sleep(0.01) # pretend this is a slow network call return f\"{name} done\" async def main(): results = await asyncio.gather(fetch(\"a\"), fetch(\"b\")) print(results)"
              - paragraph [ref=e313]:
                - code [ref=e314]: asyncio.gather
                - text: runs several coroutines concurrently and waits for all of them. If each "call" waits 100ms, three of them finish in about 100ms together instead of 300ms one after another.
